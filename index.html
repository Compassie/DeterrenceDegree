<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TDIS | Deterrence Assessment</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        #terminal {
            width: 80%;
            max-width: 800px;
            border: 1px solid #00ff41;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            background: rgba(0, 20, 0, 0.9);
        }
        h1 { text-align: center; font-size: 1.5rem; letter-spacing: 5px; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        .stats { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 20px; color: #008f11; }
        .question { margin-bottom: 30px; display: none; }
        .active { display: block; }
        .option {
            display: block;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #008f11;
            cursor: pointer;
            transition: 0.3s;
        }
        .option:hover { background: #00ff41; color: black; }
        #result { display: none; text-align: center; }
        .score { font-size: 3rem; margin: 20px 0; text-shadow: 0 0 10px #00ff41; }
        .analysis { line-height: 1.6; text-align: left; border-top: 1px solid #00ff41; padding-top: 20px; }
        .glitch { animation: flash 0.1s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="terminal">
    <div class="stats">
        <span>SOPHON_LINK: STABLE</span>
        <span>LOCATION: UNDERGROUND_BUNKER_01</span>
        <span>YEAR: 2208</span>
    </div>
    <h1>DETERRENCE INTELLIGENCE SYSTEM</h1>
    
    <div id="quiz-container">
        </div>

    <div id="result">
        <div class="glitch">>> CALCULATION COMPLETE <<</div>
        <div class="score" id="final-score">0.00%</div>
        <div id="profile-tag" style="font-weight: bold; font-size: 1.2rem;"></div>
        <p class="analysis" id="analysis-text"></p>
        <button onclick="location.reload()" style="background:none; border: 1px solid #00ff41; color:#00ff41; padding:10px; cursor:pointer;">RE-INITIALIZE SYSTEM</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Holding a 'Dead Man's Switch' for 20 years, your hand cramps. You think of:", 
          ans: [
            { t: "The faces of the billions you protect.", r:1, a:2, e:10 },
            { t: "The mechanics of the switch and how to shift grip.", r:5, a:9, e:1 },
            { t: "The silence that follows if you let go.", r:9, a:5, e:2 }
          ]
        },
        { q: "Is mercy a virtue or a tool?", 
          ans: [
            { t: "A virtue defining our humanity.", r:1, a:1, e:10 },
            { t: "A tool to manipulate enemy expectations.", r:8, a:8, e:2 },
            { t: "A sign of psychological instability.", r:10, a:4, e:0 }
          ]
        },
        { q: "A predator hunts you. You have one bullet. You aim for:", 
          ans: [
            { t: "A fuel tank to kill both of you.", r:10, a:9, e:1 },
            { t: "The predator.", r:6, a:6, e:4 },
            { t: "Yourself, to end it quickly.", r:2, a:2, e:8 }
          ]
        },
        { q: "Civilization's survival vs. its values:", 
          ans: [
            { t: "Values are irrelevant without survivors.", r:9, a:10, e:0 },
            { t: "Survive at any cost.", r:8, a:6, e:2 },
            { t: "Die with honor.", r:2, a:2, e:9 }
          ]
        }
    ];

    let currentQ = 0;
    let totalR = 0, totalA = 0, totalE = 0;

    function renderQuestion() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = "";
        let qData = questions[currentQ];
        
        let div = document.createElement('div');
        div.className = "question active";
        div.innerHTML = `<p>> ${qData.q}</p>`;
        
        // Shuffle options
        let shuffled = qData.ans.sort(() => Math.random() - 0.5);
        
        shuffled.forEach(opt => {
            let btn = document.createElement('div');
            btn.className = "option";
            btn.innerText = opt.t;
            btn.onclick = () => selectOption(opt.r, opt.a, opt.e);
            div.appendChild(btn);
        });
        container.appendChild(div);
    }

    function selectOption(r, a, e) {
        totalR += r; totalA += a; totalE += e;
        currentQ++;
        if(currentQ < questions.length) {
            renderQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = "none";
        document.getElementById('result').style.display = "block";
        
        // Calculate based on Book Logic: (R*A)/(E+1)
        let raw = (totalR * totalA) / (totalE + 1);
        let score = Math.min(99.99, (raw / 40) * 15); // Scale for 4 questions
        
        document.getElementById('final-score').innerText = score.toFixed(2) + "%";
        
        let tag = document.getElementById('profile-tag');
        let text = document.getElementById('analysis-text');

        if(score > 80) {
            tag.innerText = "[ PROFILE: THE WALLFACER ]";
            text.innerText = "Trisolaran Analysis: YOU ARE THE MONSTER. Your mind is a Dark Forest. They calculate your resolve as a mathematical certainty. The fleet has entered a state of permanent retreat. Humanity is safe as long as you breathe.";
        } else if (score > 40) {
            tag.innerText = "[ PROFILE: THE LOGICIAN ]";
            text.innerText = "Trisolaran Analysis: YOU ARE A CALCULATED RISK. You possess the logic, but your empathy creates 'noise' in the deterrence broadcast. They will not attack yet, but they are preparing an assassination attempt.";
        } else {
            tag.innerText = "[ PROFILE: THE CRADLE ]";
            text.innerText = "Trisolaran Analysis: YOU ARE THE OPPORTUNITY. You are Cheng Xin. The Trisolarans love you because your kindness is the key to their victory. The Droplets were launched 10 minutes ago. You will not press the button.";
        }
    }

    renderQuestion();
</script>
</body>
</html>
