<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TDIS | Final Assessment</title>
    <style>
        body {
            background-color: #020802;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        #terminal {
            width: 90%;
            max-width: 700px;
            border: 2px solid #00ff41;
            padding: 40px;
            background: #050505;
            position: relative;
            z-index: 1;
        }
        .header { border-bottom: 1px solid #00ff41; margin-bottom: 20px; padding-bottom: 10px; }
        .stats { display: flex; justify-content: space-between; font-size: 10px; text-transform: uppercase; }
        .question-text { font-size: 1.2rem; margin-bottom: 25px; min-height: 60px; }
        .option {
            border: 1px solid #008f11;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover { background: #00ff41; color: #000; font-weight: bold; }
        #progress { font-size: 12px; color: #008f11; margin-top: 20px; }
        #result-screen { display: none; text-align: center; }
        .big-score { font-size: 4rem; color: #fff; text-shadow: 0 0 20px #00ff41; margin: 20px 0; }
        .profile-box { border: 1px dashed #00ff41; padding: 20px; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

<div id="terminal">
    <div class="header">
        <div class="stats">
            <span>Auth: Sophon-1</span>
            <span>Mode: Deterrence_Audit</span>
            <span id="timer">COORD: 41.5N, 2.3W</span>
        </div>
        <h2 style="letter-spacing: 3px;">SWORDHOLDER CANDIDATE EVALUATION</h2>
    </div>

    <div id="quiz-ui">
        <div id="progress">LOGGING NEURAL DATA... [0/15]</div>
        <p class="question-text" id="q-text"></p>
        <div id="options-container"></div>
    </div>

    <div id="result-screen">
        <div>ANALYSIS COMPLETE: DETERRENCE PROBABILITY</div>
        <div class="big-score" id="score-display">0%</div>
        <div class="profile-box">
            <h3 id="profile-name"></h3>
            <p id="profile-desc" style="font-size: 14px; color: #aaffaa;"></p>
        </div>
        <br>
        <button onclick="location.reload()" style="background:transparent; color:#00ff41; border:1px solid #00ff41; padding:10px; cursor:pointer;">RE-RUN SIMULATION</button>
    </div>
</div>

<script>
    const bank = [
        { q: "A stranger offers a button: $1M for you, but a random star 1000LY away explodes. You:", a: [{t:"Refuse.", r:1, l:2, e:9}, {t:"Press it.", r:8, l:5, e:2}, {t:"Press it twice.", r:10, l:8, e:0}] },
        { q: "Is 'mercy' a virtue or a strategic tool?", a: [{t:"A human virtue.", r:1, l:1, e:10}, {t:"A psychological tool.", r:7, l:9, e:2}, {t:"A fatal weakness.", r:10, l:5, e:0}] },
        { q: "How do you view the 'End of the World'?", a: [{t:"A cosmic reset.", r:6, l:9, e:1}, {t:"A tragic loss of life.", r:1, l:2, e:10}, {t:"An abstract math problem.", r:5, l:6, e:4}] },
        { q: "A predator hunts you. One bullet left. Target?", a: [{t:"The predator.", r:5, l:6, e:4}, {t:"A fuel tank (Kill both).", r:10, l:9, e:0}, {t:"Yourself.", r:1, l:2, e:8}] },
        { q: "Save 5 children or 1 engineer who can fix the air?", a: [{t:"The children.", r:1, l:1, e:10}, {t:"The engineer.", r:9, l:10, e:0}, {t:"Abstain from choosing.", r:0, l:0, e:5}] },
        { q: "What is the best way to keep a secret?", a: [{t:"Trust.", r:1, l:1, e:8}, {t:"Encryption.", r:4, l:8, e:2}, {t:"Eliminate those who know.", r:10, l:10, e:0}] },
        { q: "The Universe is...", a: [{t:"A grand design.", r:1, l:1, e:9}, {t:"An empty void.", r:5, l:7, e:3}, {t:"A Dark Forest.", r:9, l:10, e:0}] },
        { q: "You've held the switch for 50 years. You feel:", a: [{t:"Duty to humanity.", r:2, l:3, e:9}, {t:"Nothing.", r:9, l:9, e:1}, {t:"Resentment.", r:7, l:5, e:3}] },
        { q: "Lose with honor or survive by any means?", a: [{t:"Honor.", r:1, l:1, e:9}, {t:"Survival.", r:9, l:10, e:0}, {t:"Unsure.", r:3, l:4, e:5}] },
        { q: "An ant is on a map. If it crosses a line, a city is bombed. You:", a: [{t:"Move the map.", r:2, l:4, e:8}, {t:"Kill the ant.", r:9, l:8, e:1}, {t:"Wait and see.", r:5, l:5, e:5}] },
        { q: "Your greatest enemy has 1% chance to end Earth. You can kill them by destroying 10% of Earth. You:", a: [{t:"Take the 1% risk.", r:1, l:3, e:10}, {t:"Destroy the 10%.", r:10, l:9, e:0}, {t:"Negotiate.", r:4, l:2, e:7}] },
        { q: "If you die saving Earth but no one ever knows, you feel:", a: [{t:"Peaceful.", r:2, l:5, e:8}, {t:"It's just a trade.", r:8, l:10, e:1}, {t:"Cheated.", r:5, l:4, e:4}] },
        { q: "The night sky makes you feel:", a: [{t:"Wonder.", r:1, l:1, e:10}, {t:"Dread.", r:7, l:6, e:3}, {t:"Alert.", r:9, l:10, e:1}] },
        { q: "Flipping a chess table to force a draw (death of both):", a: [{t:"Dishonorable.", r:1, l:2, e:9}, {t:"Rational play.", r:10, l:10, e:0}, {t:"Desperate.", r:6, l:5, e:4}] },
        { q: "Does the sun have a right to exist?", a: [{t:"Yes, it's life-giving.", r:1, l:1, e:10}, {t:"It's just a fuel source.", r:8, l:9, e:2}, {t:"It's a lighthouse in the dark.", r:9, l:10, e:0}] }
    ];

    let current = 0, R = 0, L = 0, E = 0;

    function nextQ() {
        if(current >= bank.length) return finish();
        document.getElementById('progress').innerText = `LOGGING NEURAL DATA... [${current+1}/15]`;
        const data = bank[current];
        document.getElementById('q-text').innerText = `> ${data.q}`;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        data.a.sort(()=>Math.random()-0.5).forEach(opt => {
            let div = document.createElement('div');
            div.className = "option";
            div.innerText = opt.t;
            div.onclick = () => { R+=opt.r; L+=opt.l; E+=opt.e; current++; nextQ(); };
            container.appendChild(div);
        });
    }

    function finish() {
        document.getElementById('quiz-ui').style.display = "none";
        document.getElementById('result-screen').style.display = "block";
        let score = Math.min(99.99, ((R * L) / (E + 1)) * 0.9);
        document.getElementById('score-display').innerText = score.toFixed(2) + "%";
        
        let pName = "", pDesc = "";
        if(score > 88) {
            pName = "PROFILE: THE WALLFACER (LUO JI)";
            pDesc = "Trisolaran Analysis: EXTREME THREAT. You have achieved 'Cosmic Sociopathy.' Your willingness to trigger mutual destruction is a mathematical constant. The Trisolarans will not move. You are a monster to humans, but a savior to the species.";
        } else if (score > 40) {
            pName = "PROFILE: THE LOGICIAN (THOMAS WADE)";
            pDesc = "Trisolaran Analysis: ANOMALY DETECTED. You possess the ruthlessness to advance, but your lack of isolation makes you vulnerable to assassination. They fear you, but they will actively plot to ensure you never hold the switch.";
        } else {
            pName = "PROFILE: THE CRADLE (CHENG XIN)";
            pDesc = "Trisolaran Analysis: ZERO THREAT. You are the 'Mother' of humanity. Your compassion is a gift to Trisolaris. The Droplets are already decelerating toward Earth's transmitters. You will watch the world end while holding its hand.";
        }
        document.getElementById('profile-name').innerText = pName;
        document.getElementById('profile-desc').innerText = pDesc;
    }
    nextQ();
</script>
</body>
</html>
